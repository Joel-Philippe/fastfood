<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Five Minutes">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Five Minutes</title>
  <meta name="theme-color" content="#fcf1f1" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.json">
  <script src="https://js.stripe.com/v3/"></script>
  <style id="app-shell-background">
    html, body {
      min-height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #fcf1f1 0%, #fffcdd 100%);
    }
    flt-glass-pane,
    flutter-view,
    flt-scene-host {
      background: transparent !important;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #0b0f14;
      }
    }
  </style>
</head>
<body>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <!-- ADDED: Firebase Messaging Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then(function(registration) {
            console.log('Service Worker registration successful with scope: ', registration.scope);
          }, function(err) {
            console.log('Service Worker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
